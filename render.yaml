services:
  # ─── Unified Multi-Runtime Service (FREE) ───────────
  - type: web
    name: parrotpod-full
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    # Port must match EXPOSE / ENV PORT in Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_PATH
        value: "/app/backend/parrotpod.db"
    # To keep database data across redeployments: ($5/mo)
    # disk:
    #   name: parrotpod-data
    #   mountPath: /app/backend/data
    #   sizeGB: 1
